# promtail.yml
server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: velia-backend
    static_configs:
      - targets: ['localhost']
        labels:
          app: velia
          env: development
          __path__: /logs/*.log   # lee todos tus archivos
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
      - labels:
          level:                  # filtra por nivel en Grafana